apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-app
spec:
  replicas: 1                  # start with just 1 pod
  selector:
    matchLabels:
      app: web-app
  template:
    metadata:
      labels:
        app: web-app
    spec:
      containers:
        - name: web-app
          image: k8s.gcr.io/hpa-example   # a CPU-intensive demo image
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 200m        # "I need 0.2 CPU cores minimum"
            limits:
              cpu: 500m        # "I can use max 0.5 CPU cores"

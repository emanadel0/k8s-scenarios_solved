apiVersion: v1
kind: Pod
metadata:
  name: multi-container-pod
  namespace: default
spec:

  # ────────────────────────────────
  # 1️⃣  INIT CONTAINER — runs FIRST
  #     Must complete before anything else starts
  # ────────────────────────────────
  initContainers:
    - name: init-setup
      image: busybox
      command:
        - /bin/sh
        - -c
        - |
          echo "=== INIT: Starting setup ===" 
          echo "=== INIT: Creating config file ==="
          echo "app_version=1.0" > /shared/config.txt
          echo "initialized_at=Fri Mar  6 05:45:15 AM EET 2026" >> /shared/config.txt
          echo "=== INIT: Setup complete! ==="
          sleep 5    # simulates real setup work
      volumeMounts:
        - name: shared-data
          mountPath: /shared

  containers:
    # ────────────────────────────────
    # 2️⃣  MAIN CONTAINER — the real app
    #     Starts only after init finishes
    # ────────────────────────────────
    - name: main-app
      image: busybox
      command:
        - /bin/sh
        - -c
        - |
          echo "=== MAIN: App starting ==="
          echo "=== MAIN: Reading config from init ==="
          cat /shared/config.txt
          echo "=== MAIN: App is now running ==="
          while true; do
            echo "[Fri Mar  6 05:45:15 AM EET 2026] MAIN: Handling request..." >> /shared/app.log
            sleep 3
          done
      volumeMounts:
        - name: shared-data
          mountPath: /shared

    # ────────────────────────────────
    # 3️⃣  SIDECAR CONTAINER — helper
    #     Runs alongside main, reads its logs
    # ────────────────────────────────
    - name: sidecar-logger
      image: busybox
      command:
        - /bin/sh
        - -c
        - |
          echo "=== SIDECAR: Logger starting ==="
          echo "=== SIDECAR: Waiting for app logs to appear ==="
          while true; do
            if [ -f /shared/app.log ]; then
              echo "=== SIDECAR: New log entry found ==="
              tail -1 /shared/app.log
            fi
            sleep 4
          done
      volumeMounts:
        - name: shared-data
          mountPath: /shared              # same volume = can see main's logs

  # ────────────────────────────────
  # SHARED VOLUME — all containers share this
  # ────────────────────────────────
  volumes:
    - name: shared-data
      emptyDir: {}                        # lives as long as the Pod lives
